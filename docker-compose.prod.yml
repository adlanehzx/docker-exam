version: "3.8"

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: ecommerce-mongodb-prod
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data_prod:/data/db
    networks:
      - ecommerce-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: always
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # Auth Service
  auth-service:
    build:
      context: ./services/auth-service
      target: production
    environment:
      NODE_ENV: production
      PORT: 3001
      MONGODB_URI: mongodb://root:password@mongodb:27017/auth?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-efrei_super_pass}
    expose:
      - "3001"
    networks:
      - ecommerce-network
    restart: always
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M

  # Product Service
  product-service:
    build:
      context: ./services/product-service
      target: production
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGODB_URI: mongodb://root:password@mongodb:27017/products?authSource=admin
    expose:
      - "3000"
    networks:
      - ecommerce-network
    restart: always
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M

  # Order Service
  order-service:
    build:
      context: ./services/order-service
      target: production
    environment:
      NODE_ENV: production
      PORT: 3002
      MONGODB_URI: mongodb://root:password@mongodb:27017/orders?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-efrei_super_pass}
      PRODUCT_SERVICE_URL: http://product-service:3000
    expose:
      - "3002"
    networks:
      - ecommerce-network
    restart: always
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M

  # Frontend (Vue.js served by Nginx)
  frontend:
    build:
      context: ./frontend
      target: production
    ports:
      - "80:80"
    networks:
      - ecommerce-network
    restart: always
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.25"
          memory: 64M

networks:
  ecommerce-network:
    driver: bridge

volumes:
  mongodb_data_prod:
